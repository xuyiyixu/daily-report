<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI·创业·世界 - 每日热点</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .date {
            font-size: 1.2em;
            opacity: 0.9;
        }
        .sections {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .section {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .section:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.15);
        }
        .section-title {
            font-size: 1.5em;
            margin-bottom: 16px;
            color: #667eea;
            border-bottom: 2px solid #667eea;
            padding-bottom: 8px;
        }
        .news-item {
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #eee;
        }
        .news-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .news-title {
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
            line-height: 1.4;
        }
        .news-snippet {
            font-size: 0.9em;
            color: #666;
            line-height: 1.5;
        }
        .news-link {
            font-size: 0.85em;
            color: #667eea;
            text-decoration: none;
            display: inline-block;
            margin-top: 4px;
        }
        .news-link:hover {
            text-decoration: underline;
        }
        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 40px;
        }
        .history {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-top: 20px;
        }
        .history-title {
            font-size: 1.3em;
            margin-bottom: 12px;
            color: #333;
        }
        .history-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .history-link {
            padding: 8px 16px;
            background: #f0f0f0;
            border-radius: 6px;
            text-decoration: none;
            color: #667eea;
            font-size: 0.9em;
            transition: background 0.2s;
        }
        .history-link:hover {
            background: #e0e0e0;
        }
        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            .sections { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌍 AI·创业·世界</h1>
            <div class="date" id="currentDate">加载中...</div>
        </header>

        <div id="content" class="loading">
            正在获取今日热点...
        </div>

        <div class="history">
            <div class="history-title">📅 历史日报</div>
            <div class="history-links" id="historyLinks">
                <span style="color: #999;">暂无历史记录</span>
            </div>
        </div>
    </div>

    <script>
        async function loadReport() {
            try {
                // 从 index.json 取最新一期，避免时区问题
                const idxRes = await fetch('data/index.json');
                const dates = await idxRes.json();
                const latest = dates[0];
                
                document.getElementById('currentDate').textContent = formatDate(new Date(latest + 'T12:00:00'));
                
                const response = await fetch(`data/${latest}.json`);
                if (!response.ok) throw new Error('No data');
                
                const data = await response.json();
                renderReport(data);
                loadHistory();
            } catch (error) {
                document.getElementById('content').innerHTML = 
                    '<div class="loading">今日报告尚未生成，请稍后再试</div>';
            }
        }

        function renderReport(data) {
            const html = `
                <div class="sections">
                    ${renderSection('🤖 AI 前沿', data.ai)}
                    ${renderSection('🚀 产品创业', data.startup)}
                    ${renderSection('🌐 国际形势', data.world)}
                </div>
            `;
            document.getElementById('content').innerHTML = html;
        }

        function renderSection(title, items) {
            if (!items || items.length === 0) {
                return `
                    <div class="section">
                        <div class="section-title">${title}</div>
                        <div class="news-snippet">暂无数据</div>
                    </div>
                `;
            }
            
            const newsItems = items.map(item => `
                <div class="news-item">
                    <div class="news-title">${item.title}</div>
                    <div class="news-snippet">${item.snippet}</div>
                    ${item.url ? `<a href="${item.url}" target="_blank" class="news-link">查看详情 →</a>` : ''}
                </div>
            `).join('');

            return `
                <div class="section">
                    <div class="section-title">${title}</div>
                    ${newsItems}
                </div>
            `;
        }

        function formatDate(date) {
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            const weekday = weekdays[date.getDay()];
            return `${year}年${month}月${day}日 星期${weekday}`;
        }

        async function loadHistory() {
            try {
                const response = await fetch('data/index.json');
                if (!response.ok) return;
                
                const dates = await response.json();
                const links = dates.map(date => {
                    const d = new Date(date);
                    return `<a href="?date=${date}" class="history-link">${d.getMonth()+1}/${d.getDate()}</a>`;
                }).join('');
                
                document.getElementById('historyLinks').innerHTML = links || '<span style="color: #999;">暂无历史记录</span>';
            } catch (error) {
                console.log('No history available');
            }
        }

        // Check for date parameter
        const urlParams = new URLSearchParams(window.location.search);
        const dateParam = urlParams.get('date');
        
        if (dateParam) {
            fetch(`data/${dateParam}.json`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('currentDate').textContent = formatDate(new Date(dateParam));
                    renderReport(data);
                    loadHistory();
                })
                .catch(() => {
                    document.getElementById('content').innerHTML = 
                        '<div class="loading">该日期的报告不存在</div>';
                });
        } else {
            loadReport();
        }
    </script>
</body>
</html>
